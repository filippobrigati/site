<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="max-age=31536000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <title>{{ block "title" . }}
        {{ .Site.Title }}
        {{ end }}
    </title>

    <!-- SEO Metadata -->
    <meta name="description" content="Portfolio of Filippo Brigati, a web developer from Reggio Emilia, Italy. Specializing in Angular, Node.js, .NET, PostgreSQL, and Supabase.">
    <meta name="keywords" content="Filippo Brigati, Web Developer, Portfolio, Angular, Node.js, .NET, PostgreSQL, Supabase, Reggio Emilia, University of Bologna">
    <meta name="author" content="Filippo Brigati">
    <meta name="robots" content="index, follow">
</head>

<body>
    <div class="content">
        <!-- Code that all your templates share, like a header -->
        {{ block "main" . }}
        <!-- The part of the page that begins to differ between templates -->
        {{ end }}
    </div>
</body>

</html>
